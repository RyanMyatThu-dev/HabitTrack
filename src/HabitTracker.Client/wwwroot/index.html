<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Habit Tracker – Build better habits</title>
    <meta name="description" content="Track your daily habits, visualize streaks, and build consistency with Habit Tracker." />
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="HabitTracker.Client.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f8fafc;">
            <div style="text-align:center;">
                <div style="width:48px;height:48px;border:4px solid #e2e8f0;border-top-color:#4F46E5;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;"></div>
                <p style="font-family:Inter,sans-serif;color:#64748b;font-size:14px;">Loading Habit Tracker...</p>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui" style="display:none;position:fixed;bottom:0;left:0;right:0;padding:12px 20px;background:#fef2f2;border-top:1px solid #fecaca;color:#991b1b;font-family:Inter,sans-serif;font-size:14px;z-index:9999;">
        An unhandled error has occurred.
        <a href="." style="color:#7c3aed;font-weight:600;margin-left:8px;">Reload</a>
        <span class="dismiss" style="float:right;cursor:pointer;">✕</span>
    </div>

    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>

    <script src="js/indexedDb.js"></script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
